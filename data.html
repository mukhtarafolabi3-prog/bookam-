<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Airtime & Data - Bookam</title>

<style>
:root{
  --purple:#7c3aed;
  --dark:#5b21b6;
  --bg:#f9fafb;
  --text:#1f1f2e;
  --muted:#6b7280;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body{
  background:var(--bg);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  background:white;
  width:100%;
  max-width:420px;
  padding:25px;
  border-radius:12px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
  text-align:center;
}

h2{ color:var(--dark); margin-bottom:5px; }

p{ color:var(--muted); margin-bottom:20px; }

input, select{
  width:100%;
  padding:12px;
  margin-bottom:12px;
  border:1px solid #e5e7eb;
  border-radius:8px;
  outline:none;
}

button{
  width:100%;
  padding:12px;
  background:var(--purple);
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

button:hover{
  background:var(--dark);
}

.info{
  font-size:13px;
  color:var(--muted);
  margin-top:10px;
}
</style>
</head>

<body>

<div class="box">

  <h2>Airtime & Data</h2>
  <p>Fast recharge system</p>

  <form id="vtuForm">

    <input type="text" id="phone" placeholder="Phone Number" required>

    <select id="network">
      <option value="MTN">MTN</option>
      <option value="Airtel">Airtel</option>
      <option value="Glo">Glo</option>
      <option value="9mobile">9mobile</option>
    </select>

    <select id="type">
      <option value="Airtime">Airtime</option>
      <option value="Data">Data</option>
    </select>

    <input type="number" id="amount" placeholder="Amount (₦)" required>

    <button type="submit">Pay Now</button>

  </form>

  <div class="info">
    Powered by Bookam secure payments
  </div>

</div>

<!-- PAYSTACK SCRIPT -->
<script src="https://js.paystack.co/v1/inline.js"></script>

<script>
document.getElementById("vtuForm").addEventListener("submit", function(e){
  e.preventDefault();

  let phone = document.getElementById("phone").value;
  let network = document.getElementById("network").value;
  let type = document.getElementById("type").value;
  let amount = document.getElementById("amount").value;

  if(!phone || !amount){
    alert("Please fill all fields");
    return;
  }

  if(typeof PaystackPop === "undefined"){
    alert("Paystack failed to load. Check internet.");
    return;
  }

  let handler = PaystackPop.setup({
    key: "pk_live_2bc3134481d019ee905a4c89c35eccca8fa2b6c8",
    email: "user@bookam.com",
    amount: amount * 100,
    currency: "NGN",

    metadata: {
      custom_fields: [
        { display_name: "Phone", value: phone },
        { display_name: "Network", value: network },
        { display_name: "Type", value: type }
      ]
    },

    callback: function(response){

      alert("Payment successful! Ref: " + response.reference);

      // IMPORTANT: backend call (for airtime delivery)
      fetch("http://localhost:3000/api/vtu/airtime", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          reference: response.reference,
          phone: phone,
          network: network,
          type: type,
          amount: amount
        })
      })
      .then(res => res.json())
      .then(data => {
        alert(data.message || "Processed successfully");
        console.log(data);
      })
      .catch(err => {
        console.log(err);
        alert("Error processing airtime");
      });

    },

    onClose: function(){
      alert("Transaction cancelled");
    }
  });

  handler.openIframe();
});
</script>

</body>
</html>
