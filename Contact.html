<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bookam - Contact</title>

<style>
:root {
  --purple: #7c3aed;
  --dark: #5b21b6;
  --bg: #f7f5ff;
  --text: #1f1f2e;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: var(--bg);
  color: var(--text);
}

/* NAVBAR */
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 60px;
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(10px);
  position: sticky;
  top: 0;
  z-index: 1000;
}

.logo h2 {
  color: var(--dark);
}

.nav-links {
  display: flex;
  list-style: none;
  gap: 20px;
}

.nav-links a {
  text-decoration: none;
  color: var(--text);
}

.nav-links a:hover {
  color: var(--purple);
}

.cta-btn {
  background: var(--purple);
  color: white;
  padding: 10px 18px;
  border-radius: 8px;
  text-decoration: none;
}

.menu-toggle {
  display: none;
  font-size: 26px;
  cursor: pointer;
}

/* CONTACT SECTION */
.contact {
  padding: 80px 20px;
}

.container {
  max-width: 1000px;
  margin: auto;
}

.section-title {
  text-align: center;
  font-size: 30px;
  color: var(--dark);
}

.section-sub {
  text-align: center;
  color: #6b7280;
  margin-bottom: 40px;
}

/* GRID */
.contact-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 30px;
}

/* FORM */
.contact-form {
  background: white;
  padding: 25px;
  border-radius: 12px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.05);
}

.contact-form input,
.contact-form textarea {
  width: 100%;
  padding: 12px;
  margin-bottom: 15px;
  border: 1px solid #e5e7eb;
  border-radius: 8px;
  outline: none;
  transition: 0.3s;
}

.contact-form input:focus,
.contact-form textarea:focus {
  border-color: var(--purple);
}

.contact-form button {
  width: 100%;
  padding: 12px;
  background: var(--purple);
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
}

.contact-form button:hover {
  background: var(--dark);
}

/* INFO CARD */
.contact-info {
  background: white;
  padding: 25px;
  border-radius: 12px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.05);
}

.contact-info h3 {
  margin-bottom: 10px;
  color: #111827;
}

.contact-info p {
  margin-bottom: 10px;
}

.contact-info a {
  color: var(--purple);
  text-decoration: none;
}

/* SOCIAL LINKS */
.social {
  margin-top: 15px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

/* MESSAGE */
#formMsg {
  margin-top: 10px;
  font-size: 14px;
  text-align: center;
}

/* ================= MOBILE ================= */
@media (max-width: 900px) {

  .navbar {
    padding: 15px 20px;
  }

  .menu-toggle {
    display: block;
  }

  .nav-links {
    position: absolute;
    top: 70px;
    right: -100%;
    background: white;
    width: 220px;
    flex-direction: column;
    padding: 20px;
    transition: 0.3s;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  }

  .nav-links.active {
    right: 20px;
  }

  .contact-grid {
    grid-template-columns: 1fr;
  }
}

@media (max-width: 500px) {
  .section-title {
    font-size: 24px;
  }

  .contact-form,
  .contact-info {
    padding: 18px;
  }
}
</style>

</head>

<body>

<!-- NAVBAR -->
<header class="navbar">

  <div class="logo">
    <h2>Bookam</h2>
  </div>

  <ul class="nav-links" id="navLinks">
    <li><a href="index.html">Home</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="services.html">Services</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>

  <a class="cta-btn" href="get.html">Get Started</a>

  <div class="menu-toggle" id="menuToggle">☰</div>

</header>

<!-- CONTACT -->
<section class="contact">

  <div class="container">

    <h2 class="section-title">Contact Bookam</h2>
    <p class="section-sub">We are here to help you. Send us a message anytime.</p>

    <div class="contact-grid">

      <!-- FORM -->
      <form class="contact-form" id="contactForm">

        <input type="text" id="name" placeholder="Your Name" required>
        <input type="email" id="email" placeholder="Your Email" required>
        <textarea id="message" rows="5" placeholder="Your Message" required></textarea>

        <button type="submit">Send Message</button>
        <p id="formMsg"></p>

      </form>

      <!-- INFO -->
      <div class="contact-info">

        <h3>Support Info</h3>
        <p>Email: <a href="mailto:Bookam26@gmail.com">Bookam26@gmail.com</a></p>
        <p>Phone: <a href="tel:08078734469">08078734469</a></p>

        <h3>Social Media</h3>
        <div class="social">
          <a href="https://www.tiktok.com/@justbookam" target="_blank">TikTok</a>
          <a href="https://x.com/justbookam" target="_blank">X (Twitter)</a>
        </div>

      </div>

    </div>

  </div>

</section>

<script>
// mobile menu
const menuToggle = document.getElementById("menuToggle");
const navLinks = document.getElementById("navLinks");

menuToggle.addEventListener("click", () => {
  navLinks.classList.toggle("active");
});

// simple form feedback
document.getElementById("contactForm").addEventListener("submit", function(e){
  e.preventDefault();

  document.getElementById("formMsg").innerText =
    "✅ Message sent successfully! We will reply soon.";

  this.reset();
});
</script>

</body>
</html>
