<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bookam</title>

<style>
:root {
  --purple: #7c3aed;
  --dark: #5b21b6;
  --bg: #f7f5ff;
  --text: #1f1f2e;
}

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: var(--bg);
  color: var(--text);
}

/* NAVBAR */
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 60px;
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(10px);
  position: sticky;
  top: 0;
  z-index: 1000;
}

.logo h2 {
  color: var(--dark);
}

/* NAV LINKS */
.nav-links {
  display: flex;
  list-style: none;
  gap: 20px;
}

.nav-links a {
  text-decoration: none;
  color: var(--text);
}

.nav-links a:hover {
  color: var(--purple);
}

/* BUTTON */
.cta-btn {
  background: var(--purple);
  color: white;
  padding: 10px 18px;
  border-radius: 8px;
  text-decoration: none;
}

/* MOBILE MENU ICON */
.menu-toggle {
  display: none;
  font-size: 26px;
  cursor: pointer;
}
.contact {
  padding: 80px 20px;
  background: #f9fafb;
}

.container {
  max-width: 1000px;
  margin: auto;
}

.section-title {
  text-align: center;
  font-size: 28px;
  color: #5b21b6;
}

.section-sub {
  text-align: center;
  color: #6b7280;
  margin-bottom: 40px;
}

/* GRID */
.contact-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 30px;
}

/* FORM */
.contact-form {
  background: white;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 8px 25px rgba(0,0,0,0.05);
}

.contact-form input,
.contact-form textarea {
  width: 100%;
  padding: 12px;
  margin-bottom: 15px;
  border: 1px solid #e5e7eb;
  border-radius: 8px;
  outline: none;
}

.contact-form button {
  width: 100%;
  padding: 12px;
  background: #7c3aed;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.contact-form button:hover {
  background: #5b21b6;
}

/* INFO */
.contact-info {
  background: white;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 8px 25px rgba(0,0,0,0.05);
}

.contact-info h3 {
  margin-bottom: 10px;
  color: #111827;
}

.contact-info a {
  color: #7c3aed;
  text-decoration: none;
}


  

/* MOBILE */
@media (max-width: 900px) {

  .navbar {
    padding: 15px 20px;
  }

  .nav-links {
    position: absolute;
    top: 70px;
    right: -100%;
    background: white;
    width: 220px;
    flex-direction: column;
    padding: 20px;
    display: flex;
    transition: 0.3s;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  }

  .nav-links.active {
    right: 20px;
  }

  .menu-toggle {
    display: block;
  }
  contact-grid {
    grid-template-columns: 1fr;
  }
}
</style>

</head>

<body>

<!-- NAVBAR -->
<header class="navbar">

  <div class="logo">
    <h2>Bookam</h2>
  </div>

  <ul class="nav-links" id="navLinks">
    <li><a href="index.html">Home</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="services.html">Services</a></li>
    <li><a href="bookam.html">Why Bookam</a></li>
    <li><a href="tform.html">Booking</a></li>
    <li><a href="Contact.html">Contact</a></li>
  </ul>

  <a class="cta-btn" href="get.html">Get Started</a>

  <div class="menu-toggle" id="menuToggle">☰</div>

</header>
<section class="contact" id="contact">

  <div class="container">

    <h2 class="section-title">Contact Bookam</h2>
    <p class="section-sub">
      Have questions or need support? Send us a message.
    </p>

    <div class="contact-grid">

      <!-- FORM -->
      <form class="contact-form" id="contactForm">

        <input type="text" id="name" placeholder="Your Name" required>
        <input type="email" id="email" placeholder="Your Email" required>
        <textarea id="message" placeholder="Your Message" rows="5" required></textarea>

        <button type="submit">Send Message</button>

        <p id="formMsg"></p>
      </form>

      <!-- INFO -->
      <div class="contact-info">

        <h3>Support</h3>
        <p>Email: <a href="mailto:Bookam26@gmail.com">Bookam26@gmail.com</a></p>
        <p>Phone: <a href="tel:08078734469">08078734469</a></p>

        <h3>Follow Us</h3>
        <a href="https://www.tiktok.com/@justbookam?_r=1&_t=ZS-95XKlMqtsqF" target="_blank">TikTok</a><br>
        <a href="https://x.com/justbookam?s=21&t=JXm_PAOpg8bFJ3RtzTFTTg" target="_blank">X (Twitter)</a>

      </div>

    </div>

  </div>

</section>

<script>
const menuToggle = document.getElementById("menuToggle");
const navLinks = document.getElementById("navLinks");

menuToggle.addEventListener("click", () => {
  navLinks.classList.toggle("active");
});
</script>

</body>
</html>
