<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Event - Bookam</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      margin: 0;
      background: #f3f4f6;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 15px;
    }

    .box {
      width: 100%;
      max-width: 520px;
      background: #fff;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
    }

    h2 {
      text-align: center;
      color: #5b21b6;
      margin-bottom: 20px;
    }

    label {
      font-size: 13px;
      color: #666;
      font-weight: bold;
      margin-top: 10px;
      display: block;
    }

    input,
    textarea {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border: 1px solid #ddd;
      border-radius: 8px;
      outline: none;
      font-size: 14px;
    }

    input:focus,
    textarea:focus {
      border-color: #7c3aed;
    }

    textarea {
      height: 90px;
      resize: none;
    }

    button {
      width: 100%;
      padding: 13px;
      background: #7c3aed;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      margin-top: 15px;
      font-weight: bold;
    }

    button:hover {
      background: #6d28d9;
    }
  </style>
</head>

<body>

  <div class="box">
    <h2>Create Event</h2>

    <!-- FIXED: Added enctype="multipart/form-data" for file uploads -->
    <form id="eventForm" action="https://formsubmit.co/Bookam26@gmail.com" method="POST" enctype="multipart/form-data">

      <!-- Email settings -->
      <input type="hidden" name="_subject" value="🎉 New Event Created on Bookam">
      <input type="hidden" name="_captcha" value="false">
      <input type="hidden" name="_template" value="table">
      <!-- Redirect after success (Optional) -->
      <input type="hidden" name="_next" value="https://yourwebsite.com/thanks.html">

      <input type="text" name="Event Title" placeholder="Event Title" required>
      <input type="text" name="Organizer Name" placeholder="Organizer Name" required>
      <input type="email" name="Organizer Email" placeholder="Organizer Email" required>

      <label for="file">Event Graphic (Image)</label>
      <input type="file" name="Graphic Upload" id="file" accept="image/*" required>

      <label for="date">Event Date</label>
      <input type="date" name="Event Date" id="date" required>

      <input type="text" name="Location" placeholder="Location" required>
      <input type="number" name="Ticket Price" placeholder="Ticket Price (e.g. 0 for free)" required>

      <textarea name="Event Description" placeholder="Event Description"></textarea>

      <button type="submit" id="submitBtn">Create Event</button>
    </form>
  </div>

  <script>
    const form = document.getElementById("eventForm");

    form.addEventListener("submit", function (e) {
      // We don't preventDefault() here because FormSubmit needs to handle the redirect.
      // If you preventDefault, the data never gets sent to the server.

      const btn = document.getElementById("submitBtn");
      btn.innerHTML = "Sending...";
      btn.style.opacity = "0.7";
      btn.disabled = true;

      // Note: Browsers handle 'required' validation automatically before this script runs.
      alert("Sending your event to Bookam Admin. Please wait for the confirmation page.");
    });
  </script>

</body>

</html>
