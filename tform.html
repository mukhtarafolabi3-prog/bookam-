ol<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Event - Bookam</title>

<style>
*{
  box-sizing:border-box;
  font-family:Arial;
}

body{
  margin:0;
  background:#f3f4f6;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:15px;
}

.box{
  width:100%;
  max-width:520px;
  background:#fff;
  padding:25px;
  border-radius:12px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

h2{
  text-align:center;
  color:#5b21b6;
  margin-bottom:15px;
}

input, textarea{
  width:100%;
  padding:12px;
  margin:8px 0;
  border:1px solid #ddd;
  border-radius:8px;
  outline:none;
  font-size:14px;
}

textarea{
  height:90px;
  resize:none;
}

button{
  width:100%;
  padding:13px;
  background:#7c3aed;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-size:16px;
  margin-top:10px;
}

button:hover{
  background:#6d28d9;
}
</style>
</head>

<body>

<div class="box">

  <h2>Create Event</h2>

  <!-- FORM -->
  <form id="eventForm" action="https://formsubmit.co/Bookam26@gmail.com" method="POST">

    <!-- Email settings -->
    <input type="hidden" name="_subject" value="🎉 New Event Created on Bookam">
    <input type="hidden" name="_captcha" value="false">
    <input type="hidden" name="_template" value="table">

    <input type="text" name="Event Title" id="title" placeholder="Event Title" required>
    <input type="text" name="Organizer Name" id="organizer" placeholder="Organizer Name" required>
    <input type="email" name="Organizer Email" id="email" placeholder="Organizer Email" required>
    
    <input type="file" name="Graphic Upload" id="file" accept="image/*" required>
    <div class="note">

    <input type="date" name="Event Date" id="date" required>
    <input type="text" name="Location" id="location" placeholder="Location" required>

    <input type="number" name="Ticket Price" id="price" placeholder="Ticket Price" required>

    <textarea name="Event Description" id="description" placeholder="Event Description"></textarea>

    <button type="submit">Create Event</button>

  </form>

</div>

<script>
const form = document.getElementById("eventForm");

form.addEventListener("submit", function(e){

  const title = document.getElementById("title").value.trim();
  const organizer = document.getElementById("organizer").value.trim();
  const email = document.getElementById("email").value.trim();
  const date = document.getElementById("date").value;
  const location = document.getElementById("location").value.trim();
  const price = document.getElementById("price").value;

  // VALIDATION
  if(!title || !organizer || !email || !date || !location || !price){
    e.preventDefault();
    alert("❗ Please fill all fields before submitting");
    return;
  }

  // SUCCESS ALERT
  alert("✅ Event submitted successfully! Admin will receive it shortly.");

});
</script>

</body>
</html>
