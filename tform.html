<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bookam Event Pricing System</title>

<style>
*{
  box-sizing:border-box;
  font-family:Arial;
}

body{
  margin:0;
  background:#f3f4f6;
  display:flex;
  justify-content:center;
  padding:20px;
}

.box{
  width:100%;
  max-width:650px;
  background:white;
  padding:25px;
  border-radius:12px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

h2{
  text-align:center;
  color:#7c3aed;
}

label{
  font-weight:bold;
  font-size:13px;
  color:#444;
}

input,select,textarea{
  width:100%;
  padding:12px;
  margin:6px 0 12px;
  border:1px solid #ddd;
  border-radius:8px;
}

.price-box{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.price-card{
  border:1px solid #ddd;
  padding:10px;
  border-radius:10px;
  background:#fafafa;
}

.price-card h4{
  margin:0 0 8px;
  color:#7c3aed;
  font-size:14px;
}

button{
  width:100%;
  padding:14px;
  background:#7c3aed;
  color:white;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
  margin-top:10px;
}

button:hover{
  background:#6d28d9;
}

/* IMAGE PREVIEW */
#preview{
  width:100%;
  margin-top:10px;
  display:none;
  border-radius:10px;
  border:1px solid #ddd;
}

/* MOBILE */
@media(max-width:600px){
  .price-box{
    grid-template-columns:1fr;
  }
}
</style>

</head>

<body>

<div class="box">

<h2>Create Event Pricing</h2>

<form id="eventForm"
action="https://formsubmit.co/Bookam26@gmail.com"
method="POST">

<!-- FORM SETTINGS -->
<input type="hidden" name="_subject" value="🎉 New Event Pricing Submitted">
<input type="hidden" name="_captcha" value="false">
<input type="hidden" name="_template" value="table">

<!-- EVENT INFO -->
<label>Event Title</label>
<input type="text" name="Event Title" required>

<label>Organizer Name</label>
<input type="text" name="Organizer Name" required>

<label>Event Address</label>
<input type="text" name="Event Address" required>

<!-- GRAPHIC UPLOAD -->
<label>Event Graphic / Poster</label>
<input type="file" name="Event Graphic" accept="image/*" required>

<img id="preview" alt="Preview">

<label>Description</label>
<textarea name="Description"></textarea>

<!-- PRICES -->
<h3 style="color:#7c3aed;">Set Prices</h3>

<div class="price-box">

  <div class="price-card">
    <h4>VIP Price</h4>
    <input type="number" name="VIP Price" required>
  </div>

  <div class="price-card">
    <h4>Regular Price</h4>
    <input type="number" name="Regular Price" required>
  </div>

  <div class="price-card">
    <h4>Premium Price</h4>
    <input type="number" name="Premium Price">
  </div>

  <div class="price-card">
    <h4>Other Price</h4>
    <input type="number" name="Other Price">
  </div>

</div>

<button type="submit">Send to Admin Email</button>

</form>

</div>

<script>
// IMAGE PREVIEW
document.querySelector('input[type="file"]').addEventListener("change", function(e){
  const file = e.target.files[0];
  const preview = document.getElementById("preview");

  if(file){
    const reader = new FileReader();

    reader.onload = function(){
      preview.src = reader.result;
      preview.style.display = "block";
    }

    reader.readAsDataURL(file);
  }
});

// BUTTON LOADING STATE
document.getElementById("eventForm").addEventListener("submit", function(){
  const btn = this.querySelector("button");
  btn.innerText = "Sending...";
  btn.disabled = true;
});
</script>

</body>
</html>
