<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bookam Event Pricing System</title>

<style>
*{
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  margin:0;
  background:#f3f4f6;
  display:flex;
  justify-content:center;
  padding:20px;
}

.box{
  width:100%;
  max-width:650px;
  background:white;
  padding:25px;
  border-radius:12px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

h2{
  text-align:center;
  color:#7c3aed;
  margin-bottom:20px;
}

label{
  font-weight:bold;
  font-size:13px;
  color:#444;
}

input,
select,
textarea{
  width:100%;
  padding:12px;
  margin:6px 0 12px;
  border:1px solid #ddd;
  border-radius:8px;
  outline:none;
}

input:focus,
textarea:focus{
  border-color:#7c3aed;
}

textarea{
  resize:none;
  min-height:120px;
}

.price-box{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.price-card{
  border:1px solid #ddd;
  padding:12px;
  border-radius:10px;
  background:#fafafa;
}

.price-card h4{
  margin:0 0 8px;
  color:#7c3aed;
  font-size:14px;
}

button{
  width:100%;
  padding:14px;
  background:#7c3aed;
  color:white;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
  margin-top:15px;
  font-size:15px;
  transition:0.3s;
}

button:hover{
  background:#6d28d9;
}

/* IMAGE PREVIEW */
#preview{
  width:100%;
  margin-top:10px;
  display:none;
  border-radius:10px;
  border:1px solid #ddd;
  max-height:300px;
  object-fit:cover;
}

/* OPTIONAL TEXT */
.small-text{
  font-size:12px;
  color:#777;
  margin-top:-6px;
  margin-bottom:10px;
}

/* MOBILE */
@media(max-width:600px){

  body{
    padding:12px;
  }

  .box{
    padding:18px;
  }

  .price-box{
    grid-template-columns:1fr;
  }

  h2{
    font-size:22px;
  }
}
</style>

</head>

<body>

<div class="box">

<h2>Create Event Pricing</h2>

<form id="eventForm"
action="https://formsubmit.co/Bookam26@gmail.com"
method="POST"
enctype="multipart/form-data">

<!-- FORM SETTINGS -->
<input type="hidden" name="_subject" value="🎉 New Event Pricing Submitted">
<input type="hidden" name="_captcha" value="false">
<input type="hidden" name="_template" value="table">

<!-- EVENT INFO -->
<label>Event Title</label>
<input type="text" name="Event Title" placeholder="Enter event title" required>

<label>Organizer Name</label>
<input type="text" name="Organizer Name" placeholder="Enter organizer name" required>

<label>Event Address</label>
<input type="text" name="Event Address" placeholder="Enter venue or address" required>

<!-- GRAPHIC -->
<label>Event Graphic / Poster</label>
<input type="file" name="Event Graphic" accept="image/*">

<p class="small-text">Upload flyer or event poster</p>

<img id="preview" alt="Preview">

<!-- DESCRIPTION -->
<label>Description</label>
<textarea name="Description" placeholder="Write event details"></textarea>

<!-- PRICE SECTION -->
<h3 style="color:#7c3aed;">Set Prices (Optional)</h3>

<div class="price-box">

  <div class="price-card">
    <h4>VIP Price</h4>
    <input type="number" name="VIP Price" placeholder="Optional">
  </div>

  <div class="price-card">
    <h4>Regular Price</h4>
    <input type="number" name="Regular Price" placeholder="Optional">
  </div>

  <div class="price-card">
    <h4>Premium Price</h4>
    <input type="number" name="Premium Price" placeholder="Optional">
  </div>

  <div class="price-card">
    <h4>Other Price</h4>
    <input type="number" name="Other Price" placeholder="Optional">
  </div>

</div>

<button type="submit">Send to Admin Email</button>

</form>

</div>

<script>
// IMAGE PREVIEW
const fileInput = document.querySelector('input[type="file"]');
const preview = document.getElementById("preview");

fileInput.addEventListener("change", function(e){

  const file = e.target.files[0];

  if(file){

    const reader = new FileReader();

    reader.onload = function(){
      preview.src = reader.result;
      preview.style.display = "block";
    }

    reader.readAsDataURL(file);
  }
});

// BUTTON LOADING STATE
document.getElementById("eventForm").addEventListener("submit", function(){

  const btn = this.querySelector("button");

  btn.innerText = "Sending...";
  btn.disabled = true;
});
</script>

</body>
</html>
