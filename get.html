<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bookam</title>

<style>
:root {
  --purple: #7c3aed;
  --dark: #5b21b6;
  --bg: #f7f5ff;
  --text: #1f1f2e;
}

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: var(--bg);
  color: var(--text);
}

/* NAVBAR */
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 60px;
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(10px);
  position: sticky;
  top: 0;
  z-index: 1000;
}

.logo h2 {
  color: var(--dark);
}

/* NAV LINKS */
.nav-links {
  display: flex;
  list-style: none;
  gap: 20px;
}

.nav-links a {
  text-decoration: none;
  color: var(--text);
}

.nav-links a:hover {
  color: var(--purple);
}

/* BUTTON */
.cta-btn {
  background: var(--purple);
  color: white;
  padding: 10px 18px;
  border-radius: 8px;
  text-decoration: none;
}

/* MOBILE MENU ICON */
.menu-toggle {
  display: none;
  font-size: 26px;
  cursor: pointer;
}

/* MOBILE */
@media (max-width: 900px) {

  .navbar {
    padding: 15px 20px;
  }

  .nav-links {
    position: absolute;
    top: 70px;
    right: -100%;
    background: white;
    width: 220px;
    flex-direction: column;
    padding: 20px;
    display: flex;
    transition: 0.3s;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  }

  .nav-links.active {
    right: 20px;
  }

  .menu-toggle {
    display: block;
  }
}
</style>

</head>

<body>

<!-- NAVBAR -->
<header class="navbar">

  <div class="logo">
    <h2>Bookam</h2>
  </div>

  <ul class="nav-links" id="navLinks">
    <li><a href="index.html">Home</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="services.html">Services</a></li>
    <li><a href="bookam.html">Why Bookam</a></li>
    <li><a href="tform.html">Event Booking</a></li>
    <li><a href="confrom.html">Contest Booking</a></li>
    <li><a href="Contact.html">Contact</a></li>
  </ul>

  <a class="cta-btn" href="get.html">Get Started</a>

  <div class="menu-toggle" id="menuToggle">☰</div>

</header>

<script>
const menuToggle = document.getElementById("menuToggle");
const navLinks = document.getElementById("navLinks");

menuToggle.addEventListener("click", () => {
  navLinks.classList.toggle("active");
});
</script>

</body>
</html>
