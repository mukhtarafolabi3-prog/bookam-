<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bookam Voting</title>

<style>
body{
  font-family: Arial;
  background:#f3f4f6;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  background:#fff;
  width:360px;
  padding:20px;
  border-radius:12px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

h3{
  margin-bottom:5px;
}

p{
  color:#666;
  font-size:14px;
}

.option{
  margin:15px 0;
}

label{
  display:flex;
  align-items:center;
  gap:10px;
  cursor:pointer;
}

.count{
  margin-left:auto;
  font-size:12px;
}

.bar{
  height:6px;
  background:#ddd;
  border-radius:5px;
  margin-top:5px;
  overflow:hidden;
}

.fill{
  height:100%;
  width:0%;
  background:#7c3aed;
  transition:0.4s;
}

button{
  width:100%;
  margin-top:15px;
  padding:12px;
  border:none;
  background:#7c3aed;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

button:hover{
  background:#5b21b6;
}
</style>

</head>

<body>

<div class="box">

<h3>The best dress</h3>
<p>Select one option and pay ₦100 to vote</p>

<div class="option">
<label>
<input type="radio" name="vote" value="A"> A
<span class="count" id="countA">0</span>
</label>
<div class="bar"><div class="fill" id="fillA"></div></div>
</div>

<div class="option">
<label>
<input type="radio" name="vote" value="B"> B
<span class="count" id="countB">0</span>
</label>
<div class="bar"><div class="fill" id="fillB"></div></div>
</div>

<div class="option">
<label>
<input type="radio" name="vote" value="C"> C
<span class="count" id="countC">0</span>
</label>
<div class="bar"><div class="fill" id="fillC"></div></div>
</div>

<button onclick="payAndVote()">Vote (₦100)</button>

</div>

<script src="https://js.paystack.co/v1/inline.js"></script>

<script>
let votes = JSON.parse(localStorage.getItem("votes")) || {
  A:0, B:0, C:0
};

updateUI();

function payAndVote(){

  let selected = document.querySelector('input[name="vote"]:checked');

  if(!selected){
    alert("Select an option");
    return;
  }

  let option = selected.value;

  let handler = PaystackPop.setup({
    key: "pk_live_2bc3134481d019ee905a4c89c35eccca8fa2b6c8", // public key ONLY
    email: "user@email.com",
    amount: 100 * 100,
    currency: "NGN",

    callback: function(response){
      votes[option]++;
      localStorage.setItem("votes", JSON.stringify(votes));
      updateUI();
      alert("Vote successful!");
    },

    onClose: function(){
      alert("Payment cancelled");
    }
  });

  handler.openIframe();
}

function updateUI(){
  let total = votes.A + votes.B + votes.C;

  document.getElementById("countA").innerText = votes.A;
  document.getElementById("countB").innerText = votes.B;
  document.getElementById("countC").innerText = votes.C;

  document.getElementById("fillA").style.width = total ? (votes.A/total*100)+"%" : "0%";
  document.getElementById("fillB").style.width = total ? (votes.B/total*100)+"%" : "0%";
  document.getElementById("fillC").style.width = total ? (votes.C/total*100)+"%" : "0%";
}
</script>

</body>
</html>
