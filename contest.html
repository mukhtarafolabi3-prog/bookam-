<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flutterwave Voting Analytics</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://checkout.flutterwave.com/v3.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
  --purple:#6c2bd9;
  --dark:#4e1fa8;
}

/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family: Arial;
  background: linear-gradient(135deg, var(--purple), var(--dark));
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:15px;
}

/* CONTAINER */
.container{
  display:flex;
  gap:20px;
  width:100%;
  max-width:900px;
}

/* CARDS */
.card{
  background:#fff;
  padding:20px;
  border-radius:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.left{
  width:350px;
}

.right{
  flex:1;
}

/* HEADINGS */
h2{
  text-align:center;
  margin-bottom:15px;
}

/* OPTIONS */
.option{
  margin:12px 0;
}

label{
  display:flex;
  align-items:center;
  gap:10px;
}

.count{
  margin-left:auto;
  font-size:13px;
  color:#444;
}

/* PROGRESS BAR */
.bar{
  height:6px;
  background:#ddd;
  border-radius:5px;
  overflow:hidden;
  margin-top:5px;
}

.fill{
  height:100%;
  width:0%;
  background:var(--purple);
  transition:0.3s;
}

/* BUTTON */
button{
  width:100%;
  padding:14px;
  margin-top:15px;
  border:none;
  background:var(--purple);
  color:white;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
  font-size:15px;
}

button:hover{
  background:var(--dark);
}

#status{
  text-align:center;
  font-size:13px;
  margin-top:10px;
}

/* CHART */
canvas{
  max-width:100%;
}

/* ===================== */
/* 📱 MOBILE */
/* ===================== */
@media (max-width:768px){
  .container{
    flex-direction:column;
  }

  .left,.right{
    width:100%;
  }

  h2{
    font-size:18px;
  }
}

@media (max-width:480px){
  h2{
    font-size:16px;
  }

  button{
    font-size:13px;
    padding:10px;
  }
}
</style>
</head>

<body>

<div class="container">

<!-- LEFT -->
<div class="card left">

<h2>Vote System</h2>

<div class="option">
<label>
<input type="radio" name="vote" value="A"> Option A
<span class="count" id="countA">0</span>
</label>
<div class="bar"><div class="fill" id="fillA"></div></div>
</div>

<div class="option">
<label>
<input type="radio" name="vote" value="B"> Option B
<span class="count" id="countB">0</span>
</label>
<div class="bar"><div class="fill" id="fillB"></div></div>
</div>

<div class="option">
<label>
<input type="radio" name="vote" value="C"> Option C
<span class="count" id="countC">0</span>
</label>
<div class="bar"><div class="fill" id="fillC"></div></div>
</div>

<button onclick="voteNow()">Vote (₦100)</button>

<p id="status"></p>

</div>

<!-- RIGHT -->
<div class="card right">
<h2>Payment Analytics</h2>
<canvas id="pieChart"></canvas>
</div>

</div>

<script>

// LOAD DATA
let votes = JSON.parse(localStorage.getItem("votes")) || {A:0,B:0,C:0};
let voted = localStorage.getItem("voted");

// CREATE CHART
const chart = new Chart(document.getElementById("pieChart"), {
  type: "pie",
  data: {
    labels: ["Option A", "Option B", "Option C"],
    datasets: [{
      data: [votes.A, votes.B, votes.C],
      backgroundColor: ["#6c2bd9", "#f97316", "#10b981"]
    }]
  },
  options:{
    responsive:true
  }
});

updateUI();

// GENERATE TRANSACTION REF
function generateRef(){
  return "FWV-" + Math.random().toString(36).substr(2, 9).toUpperCase();
}

// VOTE FUNCTION
function voteNow(){

  let selected = document.querySelector('input[name="vote"]:checked');
  let status = document.getElementById("status");

  if(voted){
    status.innerText = "❌ You already voted on this device";
    return;
  }

  if(!selected){
    status.innerText = "⚠️ Select an option first";
    return;
  }

  let option = selected.value;
  let reference = generateRef();

  FlutterwaveCheckout({
    public_key: "FLWPUBK-xxxxxxxxxxxxxxxxxxxxx-X", // 🔴 replace with your real key
    tx_ref: reference,
    amount: 100,
    currency: "NGN",
    payment_options: "card, banktransfer, ussd",

    customer: {
      email: "user@email.com",
      name: "Voter"
    },

    callback: function(){

      votes[option]++;
      localStorage.setItem("votes", JSON.stringify(votes));
      localStorage.setItem("voted", "true");

      voted = true;

      updateUI();
      updateChart();

      status.innerText = "✅ Vote successful!";
    },

    onclose: function(){
      status.innerText = "Payment closed";
    }
  });
}

// UPDATE UI
function updateUI(){

  let total = votes.A + votes.B + votes.C;

  document.getElementById("countA").innerText = votes.A;
  document.getElementById("countB").innerText = votes.B;
  document.getElementById("countC").innerText = votes.C;

  document.getElementById("fillA").style.width = total ? (votes.A/total*100)+"%" : "0%";
  document.getElementById("fillB").style.width = total ? (votes.B/total*100)+"%" : "0%";
  document.getElementById("fillC").style.width = total ? (votes.C/total*100)+"%" : "0%";
}

// UPDATE CHART
function updateChart(){
  chart.data.datasets[0].data = [votes.A, votes.B, votes.C];
  chart.update();
}

</script>

</body>
</html>
