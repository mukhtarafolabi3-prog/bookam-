<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bookam Event Form</title>

<style>
:root{
  --purple:#7c3aed;
  --dark:#5b21b6;
  --bg:#f3f4f6;
}

*{
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  margin:0;
  background:var(--bg);
  display:flex;
  justify-content:center;
  padding:20px;
}

.container{
  width:100%;
  max-width:650px;
  background:#fff;
  padding:25px;
  border-radius:12px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

h2{
  text-align:center;
  color:var(--purple);
}

input, textarea{
  width:100%;
  padding:12px;
  margin:8px 0;
  border:1px solid #ddd;
  border-radius:8px;
}

input:focus, textarea:focus{
  border-color:var(--purple);
  outline:none;
}

button{
  padding:12px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

.btn{
  width:100%;
  background:var(--purple);
  color:white;
  margin-top:10px;
}

.btn:hover{
  background:var(--dark);
}

.small-btns{
  display:flex;
  gap:10px;
}

.small-btns button{
  flex:1;
  background:#eee;
}

.participants{
  margin-top:10px;
}

.participant{
  display:flex;
  gap:10px;
  margin-bottom:8px;
}

.participant span{
  background:var(--purple);
  color:white;
  padding:10px;
  border-radius:6px;
  width:40px;
  text-align:center;
}

.participant input{
  flex:1;
}
</style>
</head>

<body>

<div class="container">

<h2>Create Event</h2>

<form id="eventForm"
action="https://formsubmit.co/mukhtarafolabi3@gmail.com"
method="POST">

<!-- SETTINGS -->
<input type="hidden" name="_subject" value="🎉 New Event With Participants">
<input type="hidden" name="_captcha" value="false">
<input type="hidden" name="_template" value="table">

<!-- EVENT INFO -->
<input type="text" name="Event Title" placeholder="Event Title" required>
<input type="text" name="Organizer Name" placeholder="Organizer Name" required>
<input type="email" name="Organizer Email" placeholder="Organizer Email" required>

<textarea name="Description" placeholder="Event Description"></textarea>

<!-- PARTICIPANTS -->
<h3>Participants</h3>

<div class="small-btns">
  <button type="button" onclick="addParticipant()">Add +</button>
  <button type="button" onclick="removeParticipant()">Remove -</button>
</div>

<div id="participants" class="participants"></div>

<button type="submit" class="btn" id="btn">Send Event</button>

</form>

</div>

<script>
const container = document.getElementById("participants");

function addParticipant(){
  const index = container.children.length;
  const letter = String.fromCharCode(65 + index);

  const div = document.createElement("div");
  div.className = "participant";

  div.innerHTML = `
    <span>${letter}</span>
    <input type="text" name="Participant ${letter}" placeholder="Name" required>
  `;

  container.appendChild(div);
}

function removeParticipant(){
  if(container.children.length > 0){
    container.removeChild(container.lastChild);
  }
}

// default 4 participants
for(let i=0;i<4;i++){
  addParticipant();
}

document.getElementById("eventForm").addEventListener("submit", function(){
  document.getElementById("btn").innerText = "Sending...";
});
</script>

</body>
</html>
