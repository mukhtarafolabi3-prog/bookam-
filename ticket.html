<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookam | Event Booking Portal</title>
    
    <script src="https://checkout.flutterwave.com/v3.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

    <style>
        :root {
            --brand: #6c2bd9;
            --brand-hover: #4e1fa8;
            --bg: #f8fafc;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .booking-card {
            width: 100%;
            max-width: 440px;
            background: white;
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        h2 { color: var(--brand); text-align: center; margin-top: 0; }
        p.subtitle { text-align: center; color: #64748b; font-size: 14px; margin-bottom: 25px; }

        .form-group { margin-bottom: 18px; }
        label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: #334155; }

        input, select {
            width: 100%;
            padding: 12px;
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            font-size: 15px;
            transition: 0.2s;
        }

        input:focus, select:focus {
            border-color: var(--brand);
            outline: none;
            box-shadow: 0 0 0 4px rgba(108, 43, 217, 0.1);
        }

        .price-display {
            background: #f1f5f9;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            margin: 20px 0;
        }

        .price-display span {
            font-size: 24px;
            font-weight: 800;
            color: var(--brand);
        }

        button {
            width: 100%;
            padding: 16px;
            background: var(--brand);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { background: var(--brand-hover); }
        button:disabled { background: #cbd5e1; cursor: not-allowed; }

        #status { text-align: center; margin-top: 15px; font-size: 14px; color: #ef4444; }
    </style>
</head>
<body>

<div class="booking-card">
    <h2>Bookam Events</h2>
    <p class="subtitle">Secure your date with instant payment</p>

    <div class="form-group">
        <label>Full Name</label>
        <input id="name" type="text" placeholder="Enter your name">
    </div>

    <div class="form-group">
        <label>Email Address</label>
        <input id="email" type="email" placeholder="email@example.com">
    </div>

    <div class="form-group">
        <label>Select Event Type</label>
        <select id="eventType" onchange="updatePrice()">
            <option value="">-- Choose Event --</option>
            <!-- IMPORTANT: The 'value' must match the name in the 'prices' list below -->
            <option value="afolabi event">Afolabi Event</option>
            <option value="Wedding">Wedding Ceremony</option>
            <option value="Birthday">Birthday Party</option>
        </select>
    </div>

    <div class="price-display">
        <label>Total Booking Fee</label>
        <span>₦<span id="displayAmount">0</span></span>
    </div>

    <button id="payBtn" onclick="payNow()">Pay & Book Now</button>
    <p id="status"></p>
</div>

<script>
    // --- ADMIN CONFIGURATION ---
    // You add prices here. Make sure the name matches the "value" in the <select> tag above.
    const prices = {
        "afolabi event": 100, 
        "Wedding": 500000,
        "Birthday": 150000
    };

    // Replace with your EmailJS Public Key
    emailjs.init("YOUR_EMAILJS_PUBLIC_KEY");

    function updatePrice() {
        const type = document.getElementById("eventType").value;
        const amount = prices[type] || 0;
        document.getElementById("displayAmount").innerText = amount.toLocaleString();
    }

    function generateRef() {
        return "BKM-" + Math.random().toString(36).substr(2, 6).toUpperCase();
    }

    function payNow() {
        const name = document.getElementById("name").value;
        const email = document.getElementById("email").value;
        const type = document.getElementById("eventType").value;
        const amount = prices[type];
        const status = document.getElementById("status");
        const btn = document.getElementById("payBtn");

        if (!name || !email || !type) {
            status.innerText = "Please fill in all details.";
            return;
        }

        const reference = generateRef();
        btn.disabled = true;
        btn.innerText = "Opening Gateway...";

        FlutterwaveCheckout({
            public_key: "FLWPUBK-1f089f41dc074df0535643cda9bd2833-X",
            tx_ref: reference,
            amount: amount,
            currency: "NGN",
            customer: { email: email, name: name },
            callback: function (data) {
                if (data.status === "successful") {
                    btn.innerText = "Payment Verified!";
                    status.style.color = "#10b981";
                    status.innerText = "Booking confirmed! Check your email.";
                    
                    sendEmails(name, email, type, amount, reference);
                }
            },
            onclose: function() {
                btn.disabled = false;
                btn.innerText = "Pay & Book Now";
            }
        });
    }

    function sendEmails(name, email, type, amount, ref) {
        const templateParams = {
            user_name: name,
            user_email: email,
            event_type: type,
            price: amount,
            reference: ref,
            admin_email: "Bookam26@gmail.com" 
        };

        // 1. Send to You (Admin)
        emailjs.send("YOUR_SERVICE_ID", "YOUR_ADMIN_TEMPLATE_ID", templateParams);

        // 2. Send to Customer
        emailjs.send("YOUR_SERVICE_ID", "YOUR_CUSTOMER_TEMPLATE_ID", templateParams)
            .then(() => {
                alert("Payment successful! Reference sent to your email.");
            })
            .catch(err => console.log("Email error:", err));
    }
</script>

</body>
</html>
