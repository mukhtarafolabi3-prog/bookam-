<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bookam Event System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://checkout.flutterwave.com/v3.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #6c2bd9, #4e1fa8);
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:420px;
    background:#fff;
    padding:25px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
    color:#6c2bd9;
    margin-bottom:10px;
}

small{
    display:block;
    text-align:center;
    margin-bottom:15px;
    color:#666;
}

input, select, button{
    width:100%;
    padding:12px;
    margin:8px 0;
    border-radius:8px;
    border:1px solid #ddd;
    font-size:14px;
}

button{
    background:#6c2bd9;
    color:white;
    border:none;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#4e1fa8;
}

#status{
    text-align:center;
    font-size:13px;
    margin-top:10px;
    color:#333;
}
</style>
</head>

<body>

<div class="container">
    <h2>Bookam Event System</h2>
    <small>Book your event and get instant confirmation</small>

    <input id="name" type="text" placeholder="Full Name">
    <input id="email" type="email" placeholder="Email Address">

    <select id="eventType">
        <option value="">Select Event Type</option>
        <option value="Wedding">Wedding</option>
        <option value="Birthday">Birthday</option>
        <option value="Conference">Conference</option>
        <option value="Concert">Concert</option>
        <option value="Party">Party</option>
    </select>

    <select id="location">
        <option value="">Select Event Location</option>
        <option value="Lagos">Lagos</option>
        <option value="Abuja">Abuja</option>
        <option value="Ibadan">Ibadan</option>
        <option value="Port Harcourt">Port Harcourt</option>
    </select>

    <input id="amount" type="number" placeholder="Event Budget (NGN)">
    <input id="message" type="text" placeholder="Extra Requirements (optional)">

    <button onclick="payNow()">Pay & Book Event</button>

    <p id="status"></p>
</div>

<script>
emailjs.init("YOUR_EMAILJS_PUBLIC_KEY");

function generateRef(){
    return "BOOKAM-EVT-" + Math.random().toString(36).substr(2, 9).toUpperCase();
}

function payNow(){

    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;
    let eventType = document.getElementById("eventType").value;
    let location = document.getElementById("location").value;
    let amount = document.getElementById("amount").value;
    let message = document.getElementById("message").value;
    let status = document.getElementById("status");

    if(!name || !email || !eventType || !location || !amount){
        status.innerText = "Please fill all required event details";
        return;
    }

    let reference = generateRef();

    FlutterwaveCheckout({
        public_key: "FLWPUBK-1f089f41dc074df0535643cda9bd2833-X",
        tx_ref: reference,
        amount: amount,
        currency: "NGN",
        payment_options: "card, banktransfer, ussd",

        customer: {
            email: email,
            name: name
        },

        callback: function(){
            status.innerHTML = `
                Payment Successful ✔<br>
                <b>Event Reference:</b> ${reference}
            `;

            sendEmail(name, email, eventType, location, amount, message, reference);
        },

        onclose: function(){
            status.innerText = "Payment window closed";
        }
    });
}

function sendEmail(name, email, eventType, location, amount, message, ref){

    let data = {
        user_name: name,
        user_email: email,
        event_type: eventType,
        location: location,
        amount: amount,
        message: message,
        reference: ref,
        admin_email: "Bookam26@gmail.com"
    };

    emailjs.send("YOUR_SERVICE_ID", "YOUR_USER_TEMPLATE_ID", data);

    emailjs.send("YOUR_SERVICE_ID", "YOUR_ADMIN_TEMPLATE_ID", data)
    .then(() => {
        alert("Event booked successfully! Reference sent to email.");
    })
    .catch(err => console.log(err));
}
</script>

</body>
</html>
