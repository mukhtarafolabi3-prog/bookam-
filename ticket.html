<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bookam Ticket</title>

<style>
body{
  font-family:Arial;
  background:#f3f4f6;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  margin:0;
}

.card{
  background:white;
  padding:25px;
  width:100%;
  max-width:420px;
  border-radius:12px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

h2{
  text-align:center;
  color:#5b21b6;
}

p{
  text-align:center;
  color:#6b7280;
}

input, select{
  width:100%;
  padding:12px;
  margin:8px 0;
  border:1px solid #ddd;
  border-radius:8px;
}

button{
  width:100%;
  padding:13px;
  background:#7c3aed;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

button:hover{
  background:#5b21b6;
}
</style>
</head>

<body>

<div class="card">

<h2>Bookam Ticket</h2>
<p>Secure your seat instantly</p>

<form id="form">

<input type="text" id="name" placeholder="Full Name" required>
<input type="email" id="email" placeholder="Email Address" required>

<select id="event" required>
  <option value="">Select Event</option>
  <option value="Music Concert">Music Concert</option>
  <option value="Tech Seminar">Tech Seminar</option>
  <option value="Business Conference">Business Conference</option>
</select>

<input type="number" id="qty" value="1" min="1">

<button type="submit">Pay Now</button>

</form>

</div>

<script src="https://js.paystack.co/v1/inline.js"></script>
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@2/dist/email.min.js"></script>

<script>
emailjs.init("YOUR_PUBLIC_KEY");

const ADMIN_EMAIL = "Bookam26@gmail.com";

document.getElementById("form").addEventListener("submit", function(e){
  e.preventDefault();

  let name = document.getElementById("name").value;
  let email = document.getElementById("email").value;
  let eventName = document.getElementById("event").value;
  let qty = parseInt(document.getElementById("qty").value);

  let total = qty * 100;

  let handler = PaystackPop.setup({
    key: "pk_live_2bc3134481d019ee905a4c89c35eccca8fa2b6c8",
    email: email,
    amount: total * 100,
    currency: "NGN",

    callback: function(response){

      let data = {
        name,
        email,
        event: eventName,
        qty,
        reference: response.reference
      };

      localStorage.setItem("bookingData", JSON.stringify(data));

      sendEmails(data);

      window.location.href = "confirm.html";
    },

    onClose: function(){
      alert("Payment cancelled");
    }
  });

  handler.openIframe();
});

// 📧 EMAIL FUNCTION
function sendEmails(data){

  // USER EMAIL
  emailjs.send("service_9l7h8qj", "template_user", {
    to_email: data.email,
    to_name: data.name,
    event: data.event,
    qty: data.qty,
    reference: data.reference
  });

  // ADMIN EMAIL
  emailjs.send("service_9l7h8qj", "template_admin", {
    to_email: ADMIN_EMAIL,
    customer_name: data.name,
    customer_email: data.email,
    event: data.event,
    qty: data.qty,
    reference: data.reference,
    message: "New booking received"
  });

}
</script>

</body>
</html>
